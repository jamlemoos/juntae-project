basePath: /api
definitions:
  dto.ApplicationDetailResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      message:
        type: string
      project_role_id:
        type: string
      role_title:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/dto.PublicUserResponse'
    type: object
  dto.ApplicationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      message:
        type: string
      project_role_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dto.CreateApplicationRequest:
    properties:
      message:
        minLength: 10
        type: string
      project_role_id:
        type: string
    required:
    - message
    - project_role_id
    type: object
  dto.CreateProjectRequest:
    properties:
      description:
        minLength: 10
        type: string
      roles:
        items:
          $ref: '#/definitions/dto.CreateProjectRoleInput'
        type: array
      status:
        enum:
        - OPEN
        - IN_PROGRESS
        - CLOSED
        type: string
      title:
        minLength: 3
        type: string
    required:
    - description
    - status
    - title
    type: object
  dto.CreateProjectRoleInput:
    properties:
      description:
        type: string
      status:
        enum:
        - OPEN
        - CLOSED
        type: string
      title:
        minLength: 2
        type: string
    required:
    - status
    - title
    type: object
  dto.CreateProjectRoleRequest:
    properties:
      description:
        type: string
      project_id:
        type: string
      status:
        enum:
        - OPEN
        - CLOSED
        type: string
      title:
        minLength: 2
        type: string
    required:
    - project_id
    - status
    - title
    type: object
  dto.CreateSkillRequest:
    properties:
      name:
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.CreateUserLinkRequest:
    properties:
      kind:
        enum:
        - LINKEDIN
        - GITHUB
        - BEHANCE
        - DRIBBBLE
        - FIGMA
        - PORTFOLIO
        - OTHER
        type: string
      label:
        type: string
      url:
        type: string
    required:
    - kind
    - url
    type: object
  dto.CreateUserRequest:
    properties:
      bio:
        type: string
      city:
        minLength: 2
        type: string
      email:
        type: string
      name:
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
      skill_ids:
        items:
          type: string
        type: array
    required:
    - city
    - email
    - name
    - password
    type: object
  dto.ProjectApplicationsCountResponse:
    properties:
      applications_count:
        type: integer
      project_id:
        type: string
      title:
        type: string
    type: object
  dto.ProjectDetailsResponse:
    properties:
      created_at:
        type: string
      creator:
        $ref: '#/definitions/dto.PublicUserResponse'
      description:
        type: string
      id:
        type: string
      is_owner:
        type: boolean
      roles:
        items:
          $ref: '#/definitions/dto.ProjectRoleResponse'
        type: array
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.ProjectListItemResponse:
    properties:
      created_at:
        type: string
      creator:
        $ref: '#/definitions/dto.PublicUserResponse'
      description:
        type: string
      has_applied:
        type: boolean
      id:
        type: string
      is_owner:
        type: boolean
      open_roles_count:
        type: integer
      status:
        type: string
      title:
        type: string
      total_roles_count:
        type: integer
      updated_at:
        type: string
    type: object
  dto.ProjectResponse:
    properties:
      created_at:
        type: string
      creator_id:
        type: string
      description:
        type: string
      id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.ProjectRoleResponse:
    properties:
      applications_count:
        type: integer
      created_at:
        type: string
      description:
        type: string
      has_applied:
        type: boolean
      id:
        type: string
      project_id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.PublicUserResponse:
    properties:
      city:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      skills:
        items:
          $ref: '#/definitions/dto.SkillResponse'
        type: array
    type: object
  dto.SkillResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  dto.UpdateApplicationRequest:
    properties:
      message:
        minLength: 10
        type: string
    required:
    - message
    type: object
  dto.UpdateApplicationStatusRequest:
    properties:
      status:
        enum:
        - ACCEPTED
        - REJECTED
        type: string
    required:
    - status
    type: object
  dto.UpdateProjectRequest:
    properties:
      description:
        minLength: 10
        type: string
      status:
        enum:
        - OPEN
        - IN_PROGRESS
        - CLOSED
        type: string
      title:
        minLength: 3
        type: string
    required:
    - description
    - status
    - title
    type: object
  dto.UpdateProjectRoleRequest:
    properties:
      description:
        type: string
      status:
        enum:
        - OPEN
        - CLOSED
        type: string
      title:
        minLength: 2
        type: string
    required:
    - status
    - title
    type: object
  dto.UpdateSkillRequest:
    properties:
      name:
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.UpdateUserLinkRequest:
    properties:
      kind:
        enum:
        - LINKEDIN
        - GITHUB
        - BEHANCE
        - DRIBBBLE
        - FIGMA
        - PORTFOLIO
        - OTHER
        type: string
      label:
        type: string
      url:
        type: string
    required:
    - kind
    - url
    type: object
  dto.UpdateUserRequest:
    properties:
      bio:
        type: string
      city:
        minLength: 2
        type: string
      email:
        type: string
      name:
        minLength: 2
        type: string
      skill_ids:
        items:
          type: string
        type: array
    required:
    - city
    - email
    - name
    type: object
  dto.UpsertUserProfileRequest:
    properties:
      availability:
        enum:
        - available
        - busy
        - open_to_opportunities
        type: string
      headline:
        type: string
    type: object
  dto.UserLinkResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      kind:
        type: string
      label:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  dto.UserProfileResponse:
    properties:
      availability:
        type: string
      created_at:
        type: string
      headline:
        type: string
      id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dto.UserResponse:
    properties:
      bio:
        type: string
      city:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      skills:
        items:
          $ref: '#/definitions/dto.SkillResponse'
        type: array
      updated_at:
        type: string
    type: object
  handler.loginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: supersecret
        type: string
    type: object
  handler.loginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
host: localhost:8080
info:
  contact: {}
  description: API da plataforma Juntaê — conexão de pessoas, skills, projetos e candidaturas.
  title: Juntaê API
  version: "1.0"
paths:
  /applications:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ApplicationResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List current user's applications
      tags:
      - applications
    post:
      consumes:
      - application/json
      parameters:
      - description: Application data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ApplicationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Project owner cannot apply to own project
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Already applied or project/role is closed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Apply to a project role
      tags:
      - applications
  /applications/{id}:
    delete:
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Withdraw an application (applicant only)
      tags:
      - applications
    get:
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ApplicationResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get an application by ID (applicant or project owner)
      tags:
      - applications
    put:
      consumes:
      - application/json
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated message
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ApplicationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update application message (applicant only)
      tags:
      - applications
  /applications/{id}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: New status (ACCEPTED or REJECTED)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateApplicationStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ApplicationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Accept or reject an application (project owner only)
      tags:
      - applications
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.loginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate and receive JWT
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already in use
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /project-roles:
    post:
      consumes:
      - application/json
      parameters:
      - description: Role data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProjectRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProjectRoleResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a role for a project (project owner only)
      tags:
      - project-roles
  /project-roles/{id}:
    delete:
      parameters:
      - description: ProjectRole UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a project role (project owner only)
      tags:
      - project-roles
    get:
      parameters:
      - description: ProjectRole UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProjectRoleResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a project role by ID
      tags:
      - project-roles
    put:
      consumes:
      - application/json
      parameters:
      - description: ProjectRole UUID
        in: path
        name: id
        required: true
        type: string
      - description: Role data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProjectRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProjectRoleResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a project role (project owner only)
      tags:
      - project-roles
  /projects:
    get:
      parameters:
      - description: Filter by status (OPEN, IN_PROGRESS, CLOSED)
        in: query
        name: status
        type: string
      - description: Filter by creator's city
        in: query
        name: city
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProjectListItemResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List projects (optionally filtered by status and city)
      tags:
      - projects
    post:
      consumes:
      - application/json
      parameters:
      - description: Project data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProjectResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new project
      tags:
      - projects
  /projects/{id}:
    delete:
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a project (owner only)
      tags:
      - projects
    get:
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProjectResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a project by ID
      tags:
      - projects
    put:
      consumes:
      - application/json
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Project data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProjectResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a project (owner only)
      tags:
      - projects
  /projects/{id}/applications:
    get:
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ApplicationDetailResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all applications for a project (owner only)
      tags:
      - projects
  /projects/{id}/details:
    get:
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProjectDetailsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get full project details including roles (visibility-filtered)
      tags:
      - projects
  /projects/{id}/roles:
    get:
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProjectRoleResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List roles for a project
      tags:
      - project-roles
  /projects/me:
    get:
      parameters:
      - description: Page number
        in: query
